# phase2-overrides.yaml — per-reagent overrides applied by tools/apply_overrides.py
#
# Sets category and any tacit boolean flags that the automated pipeline
# (SDS prose + ChEBI) did not detect. Source type for all entries here is
# claude_inference with ref "phase2_batch_ingest".
#
# Flags omitted from a reagent's `flags` block are left as-is (whatever
# automation set). Only explicitly listed flags are touched.

# ── MVP-10 (re-ingested from SDS) ────────────────────────────────────────────
# These were originally hand-authored; now re-parsed from SDS like any other
# reagent. Only tacit flags that SDS + ChEBI cannot detect are listed here.

- cas: "9012-90-2"   # Taq DNA Polymerase
  category: enzyme_glycerol
  numeric_properties:
    glycerol_pct: 50    # Sigma Taq D1806 is supplied in 50% glycerol (product datasheet)
  flags:
    requires_ice: true        # enzymes denature above ~4°C; thaw on ice
    is_protein: true          # enzyme = protein (ChEBI should catch this too)
    is_volatile: false
    is_flammable: false
    is_light_sensitive: false
    is_fluorophore: false
    is_reducing_agent: false
    oxidizes_in_solution: false
    make_fresh: false
    is_detergent: false
    is_foaming: false
    is_fixative: false
    is_hygroscopic: false
    is_deliquescent: false
    is_corrosive: false
    is_adsorption_prone: false
    lo_bind_required: false
    skin_penetrant: false

