# ── HEPES (free acid) ────────────────────────────────────────────────────────
- cas: "7365-45-9"
  category: hygroscopic_solid
  flags:
    is_protein: false
    is_reducing_agent: false
    is_detergent: false
    is_fixative: false
    is_foaming: false
    is_hygroscopic: true       # free acid powder absorbs moisture; store sealed
    is_deliquescent: false
    is_adsorption_prone: false
    is_light_sensitive: false
    requires_ice: false
    skin_penetrant: false

# ── EDTA disodium dihydrate ──────────────────────────────────────────────────
- cas: "6381-92-6"
  category: hygroscopic_solid
  flags:
    is_protein: false
    is_reducing_agent: false
    is_detergent: false
    is_fixative: false
    is_foaming: false
    is_hygroscopic: true       # dihydrate is mildly hygroscopic
    is_deliquescent: false
    is_adsorption_prone: false
    is_light_sensitive: false
    requires_ice: false
    skin_penetrant: false

# ── Glutaraldehyde 25% ───────────────────────────────────────────────────────
- cas: "111-30-8"
  category: fixative
  flags:
    is_protein: false
    is_reducing_agent: false
    is_detergent: false
    is_foaming: false
    is_hygroscopic: false
    is_adsorption_prone: false
    is_light_sensitive: false
    requires_ice: false
    skin_penetrant: false
    # fume_hood_required: already set true by prose
    # is_fixative: already set true by ChEBI

# ── 2-Mercaptoethanol ────────────────────────────────────────────────────────
- cas: "60-24-2"
  category: reducing_agent
  flags:
    is_protein: false
    oxidizes_in_solution: true  # thiol-based, oxidizes like DTT
    make_fresh: true            # make fresh on day of use (same as DTT)
    is_detergent: false
    is_fixative: false
    is_foaming: false
    is_hygroscopic: false
    is_adsorption_prone: false
    is_light_sensitive: false
    requires_ice: false
    skin_penetrant: true        # 2-ME penetrates skin; a real toxicity route
    # is_reducing_agent: already set true by ChEBI
    # fume_hood_required: already set true by prose

# ── SDS (sodium dodecyl sulfate) ─────────────────────────────────────────────
- cas: "151-21-3"
  category: detergent
  flags:
    is_protein: false
    is_reducing_agent: false
    is_foaming: true            # SDS is strongly foaming
    is_fixative: false
    is_adsorption_prone: false
    is_light_sensitive: false
    requires_ice: false
    skin_penetrant: false
    # is_detergent: already set true by ChEBI
    # is_hygroscopic: already set true by prose

