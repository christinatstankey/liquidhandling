# ── Acrylamide ───────────────────────────────────────────────────────────────
- cas: "79-06-1"
  category: hygroscopic_solid
  flags:
    is_protein: false
    is_reducing_agent: false
    is_detergent: false
    is_fixative: false
    is_foaming: false
    is_hygroscopic: false      # solid monomer is not notably hygroscopic
    is_deliquescent: false
    is_adsorption_prone: false
    requires_ice: false
    skin_penetrant: true       # neurotoxin absorbed through skin; no safe exposure
    # is_light_sensitive: already set true by prose (Sigma SDS says "Light sensitive")
    # fume_hood_required: already set true by prose
