# neb-lookup.yaml — curated NEB product storage and handling facts
#
# Source: NEB product pages (https://www.neb.com/products/<cat_base>) and
# NEB's published heat inactivation table:
#   https://www.neb.com/tools-and-resources/usage-guidelines/heat-inactivation
#
# Curation note: hand-curated from NEB product specifications known as of
# 2024. Fields omitted where uncertain. Use
# `python ingest/enrich_neb.py --all` to apply to reagent JSONs.
#
# Fields:
#   slug         — matches data/reagents/<slug>.json filename stem
#   cat_base     — lowercase NEB catalog base without size suffix
#   storage_temp — NEB-specified storage temperature
#   glycerol_pct — % glycerol in storage buffer (numeric)
#   heat_inactivate — temp + duration string if applicable, else null
#   notes        — optional single-sentence handling note

- slug: antarctic-phosphatase
  cat_base: m0289
  storage_temp: "-20°C"
  glycerol_pct: 50
  heat_inactivate: "65°C for 15 min"
  notes: "Active at 0–37°C; heat inactivation at 65°C makes it ideal for removing phosphates from PCR products before sequencing."

- slug: cre-recombinase
  cat_base: m0298
  storage_temp: "-20°C"
  glycerol_pct: 50
  heat_inactivate: "70°C for 10 min"

- slug: dna-polymerase-i-large-klenow-fragment
  cat_base: m0210
  storage_temp: "-20°C"
  glycerol_pct: 50
  heat_inactivate: null

- slug: dna-polymerase-i
