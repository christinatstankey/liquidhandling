# Lambda PP requires -80°C; unusually cold for an NEB enzyme — flag in notes.
- slug: lambda-protein-phosphatase
  cat_base: p0753
  storage_temp: "-80°C"
  glycerol_pct: 50
  heat_inactivate: null
  notes: "Requires -80°C storage (unusually cold for NEB enzymes). Thaw on ice; add Mn2+ for activity. Cannot be heat inactivated."

- slug: micrococcal-nuclease
  cat_base: m0247
  storage_temp: "-20°C"
  glycerol_pct: 50
  heat_inactivate: null
  notes: "Requires Ca2+ for activity; inactivate by chelation with EGTA (2 mM), not heat."

