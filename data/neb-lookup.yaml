# TEV Protease — vendor_example in some scaffolds may say "NEB T4455" (Sigma SKU);
# genuine NEB product is P8112. Either way: -20°C, 50% glycerol, not heat inactivatable.
- slug: tev-protease
  cat_base: t4455
  storage_temp: "-20°C"
  glycerol_pct: 50
  heat_inactivate: null
  notes: "Highly active at low temperatures (4–16°C); can run digestion overnight at 4°C to minimise off-target proteolysis."

