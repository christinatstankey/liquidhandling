# chebi-lookup.yaml — curated ChEBI role mappings for the 30-reagent set.
#
# Each entry maps a CAS number to one or more ChEBI ontology roles that
# are confirmed for that compound.  enrich_chebi.py reads this file as its
# primary source; live ChEBI API calls are a future enhancement.
#
# Verification: ChEBI IDs can be confirmed at https://www.ebi.ac.uk/chebi/
# Format:
#   cas: "CAS-No"          # primary key (string, matches JSON cas field)
#   chebi_id: "CHEBI:XXXXX"  # canonical ChEBI ID for the compound itself
#   roles:
#     - term: "role name"    # ChEBI ontology term (human-readable)
#       role_chebi: "CHEBI:XXXXX"  # ChEBI ID of the role (not the compound)
#       flag: is_<name>    # which tacit boolean this confirms
#       agrees: true/false

