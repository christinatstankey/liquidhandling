# rules.yaml — Reagent Handling Rules Engine
# Format:
#   id: snake_case unique identifier
#   when: dict of {property: value} or {property: {operator: value}}
#         Operators: gt, gte, lt, lte, eq, ne
#         Boolean shorthand: {is_protein: true} means is_protein == true
#         All conditions in `when` must be satisfied (AND logic)
#   then: dict of {handling_path: value} using dot notation for nesting
#   because: plain-text explanation of the rule (the WHY)
#   cite: source — manufacturer protocol, textbook, paper, or "field consensus"
#   note: if cite is "field consensus", mark as such for UI display

- id: protein_glycerol_on_ice
  when:
    is_protein: true
    glycerol_pct: {gte: 50}
  then:
    storage.requires_ice: true
    pipetting.technique: "reverse"
    pipetting.aspirate_speed: "slow"
    mixing.no_vortex: true
  because: >
    Proteins in 50% glycerol stocks (enzymes, antibodies, recombinant carriers)
    stay liquid at −20°C but denature rapidly above ~4°C. The glycerol stock is
    viscous, requiring reverse pipetting to eliminate air bubbles. Vortexing
    creates a high-shear air–water interface that unfolds proteins.
  cite: "NEB Cloning & PCR guidelines; Eppendorf Technical Guide: Viscous Liquids, 2020."

- id: pre_wet_volatile
  when:
    vapor_pressure_kPa_20C: {gte: 5}
  then:
    pipetting.pre_wet_cycles: 3
    pipetting.dispense_speed: "fast"
  because: >
    High vapor pressure (≥5 kPa at 20°C) causes significant evaporation inside the tip.
    Without pre-wetting, the headspace is dry air; the solvent flash-evaporates into it,
    creating a vapour cushion that compresses and releases unpredictably, drifting
    dispensed volume by 5–15%. Three aspirate-expel cycles saturate the headspace
    before the actual dispensing step. Fast dispense minimises dwell-time in the tip.
  cite: "Eppendorf Application Note: Pipetting Volatile Liquids, 2018. NIST WebBook CAS 64-17-5 (vapor pressure 5.95 kPa at 20°C)."

- id: viscous_no_protein
  when:
    viscosity_class: "high"
    is_protein: false
  then:
    pipetting.tip_type: "wide_bore"
    pipetting.technique: "reverse"
    pipetting.aspirate_speed: "slow"
    pipetting.post_aspirate_delay_s: 3
  because: >
    High-viscosity non-protein liquids (e.g., pure glycerol, PEG solutions) resist
    aspiration, causing back-pressure that stalls the piston and under-delivers volume.
    Wide-bore tips reduce hydraulic resistance. Reverse pipetting removes the dead-air
    step. A 2–3 s post-aspirate pause lets the meniscus stabilise before withdrawal.
  cite: "Eppendorf Technical Guide: Pipetting Viscous Liquids, 2020. Perry's Chemical Engineers' Handbook, 8th ed. (glycerol viscosity 1412 mPa·s at 20°C)."

- id: detergent_no_foam
  when:
    is_detergent: true
  then:
    pipetting.dispense_speed: "slow"
    pipetting.technique: "wall_touch_off"
    pipetting.no_blowout: true
  because: >
    Surfactants above their CMC form micelles that stabilise foam. Any air-liquid
    interface created by dispensing rapidly or by blowout air bubbles generates
    persistent foam. Dispensing slowly along the tube wall prevents air entrainment.
    Touch-off tip on the wall instead of final blowout eliminates the last drop of air.
  cite: "Corning Life Sciences Application Note: Surfactants in Liquid Handling, 2019. Field consensus."

- id: light_protect_fluorophore
  when:
    is_light_sensitive: true
  then:
    storage.light_protected: true
    storage.container: "amber_or_foil"
    safety.minimize_light_exposure: true
  because: >
    Fluorophores absorb photons and can undergo irreversible photobleaching — the
    chromophore is destroyed by oxidation or bond cleavage under illumination.
    For DAPI specifically, UV transilluminator exposure for as little as 30 seconds
    before imaging causes measurable signal loss.
  cite: "Thermo Fisher Scientific: DAPI Technical Data Sheet (D1306). Lakowicz, Principles of Fluorescence Spectroscopy, 3rd ed., Ch. 1."

- id: make_fresh_reducing_agent
  when:
    is_reducing_agent: true
  then:
    preparation.make_fresh: true
    preparation.single_use_aliquots: true
    preparation.max_age_in_solution_days: 7
  because: >
    Thiol-based reducing agents (DTT, β-mercaptoethanol) are rapidly oxidised by
    dissolved O₂ in aqueous buffers. At 4°C in standard buffer, DTT has an effective
    half-life of approximately 1 week; at room temperature in air-exposed buffer,
    this drops to hours. For critical applications (disulfide bond reduction, enzyme
    protection), the stock should be made fresh on the day of use.
  cite: "Cleland WW (1964) Biochemistry 3:480–482 (original DTT paper, redox characterisation). Sigma-Aldrich DTT Product Information Sheet D9779."

- id: fume_hood_fixative
  when:
    is_fixative: true
  then:
    safety.fume_hood_required: true
    safety.waste_stream: "formaldehyde"
    preparation.make_fresh: true
  because: >
    PFA dissolves to release formaldehyde, an IARC Group 1 (known) human carcinogen
    and respiratory sensitiser. Even brief vapour exposure during preparation is a
    documented occupational hazard. Fresh preparation from powder in PBS (rather
    than from stored 16% stock solutions) provides better morphological preservation
    and avoids formate contamination that accumulates in aged solutions.
  cite: "IARC Monographs Vol. 100F (2012): Formaldehyde classified Group 1. Fox CH et al. (1985) J Histochem Cytochem 33:845–853 (PFA fixation kinetics)."

- id: warm_freeze_prone_liquid
  when:
    physical_state: "liquid"
    freeze_point_C: {gte: 15}
  then:
    preparation.warm_to_RT_first: true
  because: >
    Liquids with freeze points at or above 15°C (DMSO ~19°C, glycerol ~18°C)
    can solidify partially or fully in a 4°C cold room or on ice. Pipetting
    a partially-solidified liquid causes systematic volume errors. The
    physical_state guard prevents the rule from misfiring on solids whose
    melting point happens to be reported in freeze_point_C (e.g. NaOH
    pellets, PFA powder).
  cite: "Sigma-Aldrich DMSO Product Information Sheet 276855 (freeze point 18.45°C). Perry's Chemical Engineers' Handbook, 8th ed. (glycerol freeze point 17.8°C)."

- id: dmso_skin_and_plastics
  when:
    skin_penetrant: true
  then:
    storage.avoid_plastics: ["polystyrene"]
    safety.skin_penetrant_warning: true
  because: >
    DMSO rapidly penetrates intact skin and carries dissolved solutes
    transdermally, making skin contact with DMSO drug stocks a real toxicity
    exposure route. Polystyrene is leached by DMSO over hours-to-days; use
    glass or polypropylene for stock storage.
  cite: "NIOSH CAS 67-68-5 skin absorption note. Sigma-Aldrich DMSO Product Information Sheet 276855. Polychemistry compatibility table (DMSO vs. plastics)."

- id: lo_bind_adsorption_prone
  when:
    is_adsorption_prone: true
  then:
    storage.container: "lo_bind"
    preparation.single_use_aliquots: true
    preparation.add_carrier_if_dilute: "BSA 0.1% if < 10 µg/mL"
    mixing.no_vortex: true
  because: >
    Proteins, oligonucleotides, and antibodies at low concentrations lose significant
    material to non-specific adsorption onto standard polypropylene and polystyrene
    surfaces within 30–60 minutes, particularly below 100 µg/mL. LoBind surfaces have
    reduced hydrophobic character; adding BSA or another carrier protein competes for
    adsorption sites and stabilises the stock at very low concentrations.
  cite: "Eppendorf LoBind Technology Technical Note, 2019. Kingston RE et al. (2003) Current Protocols in Mol. Bio.: nucleic acid quantification and dilution."

- id: desiccator_hygroscopic_solid
  when:
    is_hygroscopic: true
    physical_state: "solid"
  then:
    storage.desiccator: true
    preparation.weigh_fast: true
    preparation.cap_immediately: true
    preparation.date_first_opening: true
  because: >
    Hygroscopic and deliquescent solids absorb atmospheric water during each weighing
    event. Mass gain directly dilutes the effective molarity of the solution you
    prepare. Deliquescent solids (e.g., NaOH pellets) can become partially-dissolved
    slush within minutes in humid air, further confounding accurate weighing. Desiccator
    storage and fast weighing are the only controls for this.
  cite: "Sigma-Aldrich Handling Hygroscopic Compounds Technical Note. ASHP Guidelines on Handling Hazardous Drugs (weighing-by-difference rationale)."
