<svg viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reverse pipetting technique for viscous liquids">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .head  { font-size: 11px; font-weight: 700; fill: #374151; text-anchor: middle; }
    .lbl   { font-size: 10px; fill: #6B7280; text-anchor: middle; }
    .note  { font-size: 9px;  fill: #9CA3AF; text-anchor: middle; }
    .tip   { stroke: #0A0A0A; stroke-width: 1.2; fill: #FFFFFF; }
    .plunger { stroke: #0A0A0A; stroke-width: 1.8; fill: #E5E7EB; }
    .liq   { fill: #BFDBFE; }
    .extra { fill: #DBEAFE; stroke: #93C5FD; stroke-width: 0.8; stroke-dasharray: 3,2; }
    .bad   { stroke: #EF4444; stroke-width: 1.2; stroke-dasharray: 4,2; fill: none; }
    .ok    { stroke: #10B981; stroke-width: 1.5; fill: none; }
  </style>

  <!-- ── Divider + headers ── -->
  <line x1="210" y1="20" x2="210" y2="185" stroke="#E5E7EB" stroke-width="1"/>
  <text class="head" x="105" y="18">Standard</text>
  <text class="head" x="315" y="18" fill="#E85D2F">Reverse (recommended)</text>

  <!-- ═══ LEFT: Standard pipetting ═══ -->
  <!-- Plunger -->
  <rect class="plunger" x="60" y="30" width="22" height="12" rx="2"/>
  <line stroke="#0A0A0A" stroke-width="1.2" x1="71" y1="42" x2="71" y2="58"/>
  <!-- Barrel -->
  <rect class="tip" x="58" y="58" width="26" height="70" rx="2"/>
  <!-- Cone -->
  <polygon class="tip" points="58,128 84,128 79,155 63,155"/>
  <!-- Liquid (full barrel) -->
  <rect class="liq" x="59" y="70" width="24" height="57"/>
  <!-- Air bubble at top = volume error -->
  <ellipse cx="71" cy="65" rx="10" ry="5" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="0.8"/>
  <text style="font-size:8px;fill:#EF4444;text-anchor:middle" x="71" y="67">air</text>

  <!-- Stop markers -->
  <line x1="84" y1="90" x2="90" y2="90" stroke="#6B7280" stroke-width="1"/>
  <text class="note" x="98" y="93">stop 1</text>
  <line x1="84" y1="70" x2="90" y2="70" stroke="#EF4444" stroke-width="1"/>
  <text class="note" x="98" y="73" fill="#EF4444">blowout</text>

  <!-- Error annotation -->
  <ellipse cx="71" cy="65" rx="14" ry="9" class="bad"/>
  <text class="lbl" x="105" y="170">Blowout pushes air bubble</text>
  <text class="note" x="105" y="182">into tip → volume error</text>

  <!-- ═══ RIGHT: Reverse pipetting ═══ -->
  <!-- Plunger pushed past stop 1 to stop 2 (overfill position) -->
  <rect class="plunger" x="270" y="22" width="22" height="12" rx="2"/>
  <line stroke="#0A0A0A" stroke-width="1.2" x1="281" y1="34" x2="281" y2="58"/>
  <!-- Barrel -->
  <rect class="tip" x="268" y="58" width="26" height="70" rx="2"/>
  <!-- Cone -->
  <polygon class="tip" points="268,128 294,128 289,155 273,155"/>
  <!-- Overfilled liquid (to stop 2 level) -->
  <rect class="liq" x="269" y="59" width="24" height="68"/>
  <!-- Extra volume (dashed, will be left behind) -->
  <rect class="extra" x="269" y="59" width="24" height="22"/>

  <!-- Stop 1 marker (dispense to here, leave extra above) -->
  <line x1="294" y1="82" x2="300" y2="82" stroke="#10B981" stroke-width="1"/>
  <text class="note" x="310" y="85" fill="#10B981">stop 1</text>
  <!-- Stop 2 marker (aspirate to here) -->
  <line x1="294" y1="62" x2="300" y2="62" stroke="#6B7280" stroke-width="1"/>
  <text class="note" x="310" y="65">stop 2</text>

  <!-- Check annotation -->
  <polyline points="248,105 254,111 264,98" class="ok" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="lbl" x="315" y="170">Dispense to stop 1 only</text>
  <text class="note" x="315" y="182">extra liquid stays in tip → no air</text>
</svg>
