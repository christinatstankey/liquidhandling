<svg viewBox="0 0 380 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LoBind tube prevents protein adsorption">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .head  { font-size: 11px; font-weight: 700; fill: #374151; text-anchor: middle; }
    .lbl   { font-size: 10px; fill: #6B7280; text-anchor: middle; }
    .note  { font-size: 9px;  fill: #9CA3AF; text-anchor: middle; }
    .tube  { stroke: #9CA3AF; stroke-width: 1.5; fill: #F9FAFB; }
    .liq   { fill: #EFF6FF; stroke: #BFDBFE; stroke-width: 0.8; }
    .dot   { fill: #E85D2F; }
    .dot-free { fill: #10B981; }
    .stuck { fill: none; stroke: #EF4444; stroke-width: 1; stroke-dasharray: 2,2; }
  </style>

  <!-- Headers -->
  <text class="head" x="95"  y="16">Standard tube</text>
  <text class="head" x="285" y="16" fill="#10B981">LoBind tube</text>
  <line x1="190" y1="10" x2="190" y2="180" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ── Left: standard tube ── -->
  <!-- Tube shape -->
  <path class="tube" d="M55,30 L55,140 Q55,165 95,165 Q135,165 135,140 L135,30 Z"/>
  <!-- Liquid -->
  <path class="liq" d="M56,70 L56,140 Q56,163 95,163 Q134,163 134,140 L134,70 Z"/>

  <!-- Protein dots stuck to walls -->
  <circle class="dot" cx="57"  cy="80"  r="4"/>
  <circle class="dot" cx="57"  cy="98"  r="3.5"/>
  <circle class="dot" cx="57"  cy="116" r="4"/>
  <circle class="dot" cx="133" cy="85"  r="3.5"/>
  <circle class="dot" cx="133" cy="104" r="4"/>
  <circle class="dot" cx="133" cy="123" r="3.5"/>
  <circle class="dot" cx="72"  cy="163" r="3.5"/>
  <circle class="dot" cx="118" cy="163" r="3.5"/>

  <!-- Circles showing they're stuck (dashed rings) -->
  <circle class="stuck" cx="57"  cy="80"  r="7"/>
  <circle class="stuck" cx="57"  cy="116" r="7"/>
  <circle class="stuck" cx="133" cy="85"  r="7"/>
  <circle class="stuck" cx="133" cy="123" r="7"/>

  <!-- Free-floating protein dots in solution -->
  <circle class="dot" cx="80"  cy="90"  r="3.5"/>
  <circle class="dot" cx="95"  cy="110" r="4"/>
  <circle class="dot" cx="110" cy="88"  r="3.5"/>
  <circle class="dot" cx="85"  cy="130" r="3.5"/>
  <circle class="dot" cx="108" cy="130" r="3"/>

  <!-- Loss annotation -->
  <text class="lbl" x="95" y="178" fill="#EF4444">protein lost to walls</text>

  <!-- ── Right: LoBind tube ── -->
  <path class="tube" d="M245,30 L245,140 Q245,165 285,165 Q325,165 325,140 L325,30 Z" stroke="#10B981" stroke-width="1.5"/>
  <path d="M246,70 L246,140 Q246,163 285,163 Q324,163 324,140 L324,70 Z" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="0.8"/>

  <!-- All protein stays in solution (green dots, all floating) -->
  <circle class="dot-free" cx="260" cy="85"  r="4"/>
  <circle class="dot-free" cx="275" cy="105" r="3.5"/>
  <circle class="dot-free" cx="295" cy="90"  r="4"/>
  <circle class="dot-free" cx="310" cy="110" r="3.5"/>
  <circle class="dot-free" cx="268" cy="125" r="3.5"/>
  <circle class="dot-free" cx="285" cy="112" r="4"/>
  <circle class="dot-free" cx="302" cy="130" r="3.5"/>
  <circle class="dot-free" cx="255" cy="110" r="3"/>
  <circle class="dot-free" cx="315" cy="95"  r="3"/>
  <circle class="dot-free" cx="280" cy="135" r="3"/>
  <circle class="dot-free" cx="298" cy="145" r="3.5"/>

  <!-- Low-bind surface indicator -->
  <text class="note" x="285" y="178" fill="#10B981">protein stays in solution ✓</text>

  <!-- Legend -->
  <circle fill="#E85D2F"  cx="22"  cy="168" r="4"/>
  <text class="note" x="22" y="182" fill="#6B7280">protein</text>
</svg>
