<svg viewBox="0 0 420 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pre-wet tip cycles for volatile liquids">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; fill: #374151; }
    .label { font-size: 11px; font-weight: 600; fill: #6B7280; text-anchor: middle; }
    .step  { font-size: 10px; fill: #9CA3AF; text-anchor: middle; }
    .arrow { stroke: #E85D2F; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
    .tip   { stroke: #0A0A0A; stroke-width: 1.2; fill: #FFFFFF; }
    .liq   { fill: #BFDBFE; }
    .vapor { fill: #E0F2FE; stroke: #BAE6FD; stroke-width: 0.8; stroke-dasharray: 3,2; }
  </style>
  <defs>
    <marker id="ah" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E85D2F"/>
    </marker>
  </defs>

  <!-- Step labels -->
  <text class="label" x="70"  y="16">Cycle 1</text>
  <text class="label" x="210" y="16">Cycle 2</text>
  <text class="label" x="350" y="16">Cycle 3</text>

  <!-- Dividers -->
  <line x1="140" y1="10" x2="140" y2="170" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="280" y1="10" x2="280" y2="170" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ── Cycle 1: dry tip aspirates → vapor in headspace ─── -->
  <!-- Tip barrel -->
  <rect class="tip" x="52" y="28" width="18" height="72" rx="2"/>
  <!-- Tip cone -->
  <polygon class="tip" points="52,100 70,100 64,128 58,128"/>
  <!-- Vapour zone (headspace, top of barrel) -->
  <rect class="vapor" x="53" y="29" width="16" height="36" rx="1"/>
  <!-- Liquid (bottom half) -->
  <rect class="liq" x="53" y="65" width="16" height="34"/>
  <!-- Aspirate arrow -->
  <line class="arrow" x1="90" y1="80" x2="78" y2="80"/>
  <text class="step" x="70" y="150">aspirate</text>
  <text class="step" x="70" y="162">vapor in tip</text>

  <!-- ── Cycle 2: expel back ── -->
  <rect class="tip" x="192" y="28" width="18" height="72" rx="2"/>
  <polygon class="tip" points="192,100 210,100 204,128 198,128"/>
  <!-- Nearly empty after expel -->
  <rect class="liq" x="193" y="95" width="16" height="4"/>
  <!-- Expel arrow -->
  <line class="arrow" x1="222" y1="80" x2="218" y2="80"/>
  <line x1="218" y1="76" x2="218" y2="84" stroke="#E85D2F" stroke-width="1.5"/>
  <!-- flip arrow direction -->
  <line stroke="#E85D2F" stroke-width="1.5" x1="180" y1="80" x2="192" y2="80" marker-end="url(#ah2)" fill="none"/>
  <defs>
    <marker id="ah2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#E85D2F"/>
    </marker>
  </defs>
  <text class="step" x="210" y="150">expel back</text>
  <text class="step" x="210" y="162">headspace saturates</text>

  <!-- ── Cycle 3: headspace saturated, accurate delivery ── -->
  <rect class="tip" x="332" y="28" width="18" height="72" rx="2"/>
  <polygon class="tip" points="332,100 350,100 344,128 338,128"/>
  <!-- Liquid filling tip (accurate) -->
  <rect class="liq" x="333" y="54" width="16" height="45"/>
  <!-- Small saturated vapor zone -->
  <rect class="vapor" x="333" y="29" width="16" height="24" rx="1"/>
  <!-- Aspirate arrow -->
  <line class="arrow" x1="368" y1="80" x2="358" y2="80"/>
  <!-- Checkmark -->
  <polyline points="310,75 316,81 326,68" stroke="#10B981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="step" x="350" y="150">aspirate again</text>
  <text class="step" x="350" y="162">accurate volume ✓</text>
</svg>
